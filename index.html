<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Force Light Theme and clear any past dark mode choices -->
    <script>
      (function () {
        try {
          localStorage.removeItem('theme');
          document.documentElement.classList.remove('dark');
        } catch (e) {}
      })();
    </script>

    <title>Navneet Patidar</title>

    <meta
      name="description"
      content="UI/UX & Product Designer"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="/portfolio-favicon.png" />

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      #root {
        height: 100%;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
