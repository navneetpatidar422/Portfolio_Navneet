<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Blocking theme script: runs before render to prevent flash of dark mode -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          if (saved === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            // Always light by default — dark is user's explicit choice only
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>

    <title>Navneet Patidar</title>

    <meta
      name="description"
      content="Crafting pixel-perfect user interfaces today, while engineering the scalable product experiences of tomorrow. B.Tech IIoT student specializing in Industrial IoT at USAR, GGSIPU, New Delhi."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="/portfolio-favicon.png" />

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      #root {
        height: 100%;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
